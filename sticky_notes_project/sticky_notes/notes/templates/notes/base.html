<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sticky Notes Board{% endblock %}</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    
    <style>
        body { 
            background-color: #f8fafc; 
            min-height: 100vh;
        }
        .navbar-custom {
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            color: white;
            border-radius: 0 0 16px 16px;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Central Header Section -->
    <header class="navbar-custom shadow-sm py-4 mb-5">
        <div class="container text-center">
            <h1 class="display-6 fw-bold mb-1">Sticky Board</h1>
            <p class="lead fs-6 opacity-75 mb-0">Thoughts here..</p>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap 5-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></script>
</body>
</html>
